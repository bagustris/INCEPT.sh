task: command
mode: dpo
base_model: outputs/merged-command-v2
max_seq_length: 512
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: [q_proj, k_proj, v_proj, o_proj, in_proj_qkv, in_proj_a, in_proj_b, in_proj_z, out_proj, gate_proj, up_proj, down_proj]
use_quantization: false
learning_rate: 2.0e-4
lr_scheduler: cosine
warmup_ratio: 0.05
num_epochs: 2
per_device_batch_size: 4
gradient_accumulation_steps: 4
weight_decay: 0.01
train_file: data/v2/dpo_command_pairs.jsonl
output_dir: outputs/dpo-command
save_strategy: "no"
logging_steps: 10
seed: 42
device: mps
dpo:
  beta: 0.1
  learning_rate: 5.0e-5
  num_epochs: 2
